services:
  - type: web
    name: mems-ml-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GMAIL_EMAIL
        sync: false  # Set in Render dashboard
      - key: GMAIL_APP_PASSWORD
        sync: false  # Set in Render dashboard
